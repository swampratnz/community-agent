name: Setup pipeline labels

# Manually-triggered: creates/updates the labels that drive the multi-loop
# pipeline (docs/PIPELINE.md). Run once from the Actions tab — no local gh
# needed. Safe to re-run (idempotent via --force).

on:
  workflow_dispatch:

permissions:
  contents: read # required by actions/checkout on a private repo
  issues: write

jobs:
  labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false # the script uses GH_TOKEN env, not git
      - name: Create labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/setup-labels.sh
