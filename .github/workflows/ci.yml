name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Merge queue: run the SAME required checks (build/lint/security-invariants)
  # on the queue's temporary branch — main + the queued PR(s) merged together —
  # so each PR is verified against the exact tree it will land as, and the
  # queue integrates PRs one at a time without a human re-syncing each branch
  # against a moving main. Required for the `main` branch-protection "Require
  # merge queue" setting: the queue blocks on these checks, so they MUST fire on
  # `merge_group` or every merge would stall.
  merge_group:

# Rapid pushes to a PR would otherwise stack redundant full CI runs (each with
# its own pgvector service). Supersede-and-cancel applies to PR runs ONLY —
# pushes to main and merge-queue runs always run to completion (a cancelled
# queue check would wedge the queue). A superseded run concludes `cancelled`,
# not `failure`, so ci-retry / pipeline-pr-autofix (both keyed on failure)
# ignore it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege (audit M7): this workflow runs on `pull_request`, which
# includes forks and executes attacker-controlled PR code (npm lifecycle
# scripts, migrate, test, build). All three jobs are read-only, so pin the
# GITHUB_TOKEN to `contents: read` rather than inheriting the repo/org default
# (read/write on older repos) — one settings change should not be able to
# re-widen what a fork-triggered run can do.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: community_agent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Dummy values so config.ts's zod schema is satisfied — nothing in
      # this job talks to Claude or Discord, only DATABASE_URL is real.
      CLAUDE_CODE_OAUTH_TOKEN: ci-dummy-token
      DISCORD_BOT_TOKEN: ci-dummy-token
      DISCORD_GUILD_ID: ci-dummy-guild
      WHATSAPP_PROVIDER: disabled
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/community_agent_test
    steps:
      # persist-credentials:false everywhere in this repo's workflows: no CI
      # step needs a git credential after checkout, and `npm test` executes
      # PR code, so the job token must not sit readable in .git/config.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # The local embedding model (transformers.js) downloads into
      # node_modules/@huggingface/transformers/.cache, which npm ci wipes — so
      # every run re-fetched it from huggingface.co (wall-clock + an external
      # fetch that can flake). actions/cache restores at THIS step's position
      # (after npm ci), so the restored files survive; save happens post-job.
      # Bump the key suffix if EMBEDDING_MODEL ever changes.
      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: node_modules/@huggingface/transformers/.cache
          key: hf-embedding-model-all-MiniLM-L6-v2-v1
      - run: npm run typecheck
      - run: npm run migrate
      - run: npm test
      - run: npm run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  security-invariants:
    # No postgres service here, deliberately: this job pins the security
    # spine (RBAC tool gating, outbound filtering, confirm-gating — see
    # CLAUDE.md's "do not regress" list) and must be deterministic regardless
    # of DB reachability. DATABASE_URL is intentionally UNSET: the DB-backed
    # SECURITY tests key their skip on `Boolean(process.env.DATABASE_URL)`, so
    # a set-but-unreachable URL would make them RUN and fail — unset makes them
    # skip cleanly (the test harness sets its own dummy default for config's
    # zod schema). The count floor in scripts/check-security-test-count.mjs
    # counts a skip the same as a pass, so the required count is stable.
    runs-on: ubuntu-latest
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ci-dummy-token
      DISCORD_BOT_TOKEN: ci-dummy-token
      DISCORD_GUILD_ID: ci-dummy-guild
      WHATSAPP_PROVIDER: disabled
      # Base ref for the security-floor lowering guard (audit H1). Empty on
      # push/merge_group (guard inactive there); the PR base commit on
      # pull_request. `allow-security-floor-lower` label forces the override so
      # a genuine SECURITY-test removal is a conscious, labelled human act.
      SECURITY_FLOOR_BASELINE_REF: ${{ github.event.pull_request.base.sha }}
      ALLOW_SECURITY_FLOOR_LOWER: ${{ contains(github.event.pull_request.labels.*.name, 'allow-security-floor-lower') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Full history so the lowering guard can `git show <base>:…` the base
          # manifest (audit H1); a shallow clone wouldn't have the base commit.
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # The local embedding model (transformers.js) downloads into
      # node_modules/@huggingface/transformers/.cache, which npm ci wipes — so
      # every run re-fetched it from huggingface.co (wall-clock + an external
      # fetch that can flake). actions/cache restores at THIS step's position
      # (after npm ci), so the restored files survive; save happens post-job.
      # Bump the key suffix if EMBEDDING_MODEL ever changes.
      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: node_modules/@huggingface/transformers/.cache
          key: hf-embedding-model-all-MiniLM-L6-v2-v1
      - run: npm run test:security
