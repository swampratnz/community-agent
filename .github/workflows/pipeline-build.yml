name: Pipeline build worker

# Event-driven BUILD loop (see docs/PIPELINE.md). Fires when a proposal issue
# is labelled `status:approved` and implements it on a branch + PR — no live
# Claude session needed. Authenticated with a Claude Max subscription via the
# CLAUDE_CODE_OAUTH_TOKEN secret (from `claude setup-token`), so it draws on the
# subscription, not a metered API key.
#
# PREREQUISITES to go live (until then this is inert and simply logs a note):
#   1. Install the Claude GitHub App on this repo (lets the action comment/push).
#   2. Add repo secret CLAUDE_CODE_OAUTH_TOKEN (Settings → Secrets → Actions).
#
# COST: every run draws on the SAME Max pool as the production bot and every
# other session. `concurrency` is now per-issue (see below), so distinct
# issues build in parallel; `--max-turns` + `timeout-minutes` bound a single
# run, and releasing issues in small batches bounds total parallel draw.
#
# WHY the explicit allowedTools + verify step: an earlier run finished with
# conclusion=success but 12 permission denials and no branch/PR/relabel — the
# action's opaque agent-mode defaults denied the write tools it needed, so it
# narrated the work instead of doing it and the proposal stuck at
# `status:approved` with no visible failure. We now (a) pre-approve exactly the
# tools a build needs so there is zero denial thrash, and (b) verify the
# outcome deterministically: if no open PR closing this issue exists, relabel
# `needs-human`, comment, and fail the job loudly.

on:
  issues:
    types: [labeled]

# SERIAL builds — one at a time across the whole repo (a single fixed group,
# NOT keyed by issue). Why the change from per-issue-parallel: every build draws
# on the SAME shared Max pool, and per-issue parallelism let N approved/retried
# issues run at once, so each turn got rate-limited, every build blew past its
# 60-minute wall-clock, and ALL of them escalated `needs-human` — then the
# build-retry loop re-ran the failures, adding MORE parallel load: a contention
# death spiral (observed 2026-07-04: five small proposals, incl. #90, all
# cancelled at exactly 60 min with `npm test` still running). Serialising means
# each build gets the full pool and finishes in time; the backlog drains one PR
# at a time instead of failing all at once. `cancel-in-progress: false` queues
# rather than cancelling, so a re-trigger of the same (or any) issue never
# double-runs. Slower but reliable — the shared pool is the bottleneck, not CI
# minutes.
concurrency:
  group: pipeline-build
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write # claude-code-action mints its GitHub App token via OIDC

jobs:
  build:
    # Only react to the approved label; ignore every other label event.
    if: github.event.label.name == 'status:approved'
    runs-on: ubuntu-latest
    # Wall-clock guard sized to the turn cap below: ~7s/turn observed means
    # 300 turns can legitimately run ~40 min; 60 keeps headroom without
    # letting a hung run camp on the concurrency slot all day.
    timeout-minutes: 60
    # A real pgvector Postgres so the worker's OWN verification runs the
    # DB-integration tests (which skip without DATABASE_URL) against the same
    # database CI will use on the PR. Without this the worker "passes" locally
    # while DB-behaviour/latency bugs only surface in CI's build job (see #79).
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: community_agent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # secrets are allowed in job-level env; this keeps the action step inert
      # until the token exists, so the workflow is safe to merge beforehand.
      HAS_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      # Dummy app config so the repo's tests/migrate can load config.ts; only
      # DATABASE_URL is real. CLAUDE_CODE_OAUTH_TOKEN is deliberately NOT set
      # here — the action injects the real one for the agent, and overriding it
      # would break the agent's auth.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/community_agent_test
      DISCORD_BOT_TOKEN: ci-dummy-token
      DISCORD_GUILD_ID: ci-dummy-guild
      WHATSAPP_PROVIDER: disabled
    steps:
      - name: Inert notice (token not set)
        if: env.HAS_TOKEN != 'true'
        run: echo "CLAUDE_CODE_OAUTH_TOKEN not set — build worker is inert. Add the secret + install the Claude GitHub App to enable."

      # Stamp the moment this run starts, before the build can open anything.
      # The verify step only counts a PR created AFTER this instant, so a stale
      # PR left by a prior attempt can never be mistaken for this run's output.
      - name: Record job start (PR freshness watermark)
        if: env.HAS_TOKEN == 'true'
        run: echo "STARTED_AT=$(date -u +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4
        if: env.HAS_TOKEN == 'true'

      # Create the base schema deterministically BEFORE the agent runs, so its
      # `npm test` sees a migrated DB. Leaving migration to the agent's prose
      # gate was fragile: a run that executed `npm test` before `npm run migrate`
      # failed EVERY DB-integration test with "relation does not exist" and
      # produced no PR (run 28693678835). node_modules persists into the action
      # step below; the agent still re-runs `npm run migrate` after adding any
      # new migration of its own (idempotent).
      - name: Migrate base schema (deterministic — do not leave to the agent)
        if: env.HAS_TOKEN == 'true'
        env:
          # config.ts (loaded by migrate) requires CLAUDE_CODE_OAUTH_TOKEN, but
          # the job env omits it (the action injects the real one). migrate
          # never calls Claude, so a dummy satisfies the zod schema — matching
          # ci.yml's build job.
          CLAUDE_CODE_OAUTH_TOKEN: ci-dummy-token
        run: |
          npm ci
          npm run migrate

      - name: Build the approved proposal
        id: build
        if: env.HAS_TOKEN == 'true'
        continue-on-error: true # never let a mid-run failure hide the outcome; the verify step below is the source of truth
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the BUILD worker for the NZ Claude Community agent pipeline.
            Issue #${{ github.event.issue.number }} was just labelled `status:approved`.

            Read CLAUDE.md (conventions + security posture you must not regress) and
            docs/PIPELINE.md (ownership rules) first, then:
            1. Relabel this issue `status:building` and comment that you've claimed it.
            2. Implement the approved proposal on a new branch. Match existing style
               and write/extend tests. A pgvector Postgres is available at
               DATABASE_URL, so run the FULL gate CI will run on your PR and make
               every one green BEFORE opening it:
                 - npm run typecheck
                 - npm run lint
                 - npm run format:check   (run `npm run format` to fix, then re-check)
                 - npm run migrate
                 - npm test               (DB-integration tests run here — NOT skipped)
                 - npm run build
                 - npm run test:security
               Do not open the PR until all of these pass. CI runs the identical
               checks, so a red PR only creates rework for a human.
            3. Open a pull request whose body starts with "Closes #${{ github.event.issue.number }}",
               summarising the change, its security/privacy impact, and how you verified
               it. Then relabel the issue `status:built`.
            4. Do NOT merge — a human merges. If the proposal turns out infeasible or
               unsafe as specified, add the `needs-human` label and explain instead of
               forcing it.
            Implement only this one approved issue.
          # Pre-approve exactly the tools a build needs so there is no
          # permission-denial thrash. Without this the action falls back to its
          # opaque agent-mode defaults and silently denies git/gh/npm writes.
          # Deliberately NO bare `rm`/`sed`: the build worker processes
          # (potentially adversarial) issue content, so we keep the shell
          # surface minimal — file rewrites go through Edit/Write and tracked
          # deletions through `git rm` (covered by Bash(git:*)).
          # Turn-cap history: 40 died at turn 41 on a small 4-file proposal
          # (issue #27); 80 died at turn 81 on a repo-wide job (issue #41,
          # ESLint+Prettier — formatting sweeps and lint-fix iteration eat
          # turns fast). 300 gives real proposals room to finish; the
          # timeout-minutes above stays the wall-clock guard (~7s/turn
          # observed, so 300 turns ≈ 40 min worst case).
          claude_args: |
            --max-turns 300
            --model sonnet
            --allowedTools "Edit,Write,Read,MultiEdit,Grep,Glob,LS,TodoWrite,Bash(git:*),Bash(gh:*),Bash(npm:*),Bash(npx:*),Bash(node:*),Bash(mkdir:*),Bash(mv:*),Bash(cp:*),Bash(cat:*),Bash(ls:*)"

      - name: Verify a PR was produced (else escalate + fail loudly)
        if: always() && env.HAS_TOKEN == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # A build "succeeded" only if there is an OPEN PR that:
          #   (a) closes THIS issue in its body,
          #   (b) lives in THIS repo — not a fork (isCrossRepository == false),
          #       so an external contributor's throwaway "Closes #N" PR can't
          #       spoof success, and
          #   (c) was created AFTER this run started (createdAt >= STARTED_AT),
          #       so a stale PR from a prior attempt can't mask a fresh no-op.
          # Anything else (silent no-op, denial thrash, crash) is surfaced, not
          # swallowed by a green check.
          match="$(gh pr list --state open --limit 100 \
            --json number,body,createdAt,isCrossRepository \
            --jq "[.[] | select((.isCrossRepository | not) and ((.body // \"\") | test(\"[Cc]loses #${ISSUE_NUMBER}\\\\b\")) and ((.createdAt | fromdateiso8601) >= ${STARTED_AT}))] | .[0].number // empty")"

          if [ -n "${match}" ]; then
            echo "Build produced PR #${match} closing issue #${ISSUE_NUMBER}."
            exit 0
          fi

          echo "::error::Build worker produced no PR closing issue #${ISSUE_NUMBER} (attempt ${{ github.run_attempt }})."
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Auto-retry: pipeline-build-retry.yml re-runs this run on failure (up
          # to attempt 3), so transient/infra failures recover without a human.
          # Only escalate needs-human on the FINAL attempt — a human is pinged
          # once retries are exhausted, not on every flake. Keep this `>= 3` cap
          # in sync with the `< 3` guard in pipeline-build-retry.yml.
          if [ "${{ github.run_attempt }}" -ge 3 ]; then
            gh issue edit "${ISSUE_NUMBER}" --add-label needs-human || true
            gh issue comment "${ISSUE_NUMBER}" --body "🤖 Build worker produced **no pull request** after ${{ github.run_attempt }} attempts (auto-retried). Labelled \`needs-human\` for a maintainer — this is a persistent failure, not a flake. Latest run: ${run_url}" || true
          else
            echo "Not escalating yet — the auto-retry loop will re-run this build (attempt ${{ github.run_attempt }} < 3)."
          fi

          exit 1
